<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微信支付</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #07c160;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 40px 30px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    max-width: 380px;
    width: 100%;
  }
  .title {
    font-size: 22px;
    color: #333;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .desc {
    font-size: 14px;
    color: #888;
    margin-bottom: 24px;
  }
  .qr-img {
    width: 280px;
    height: auto;
    border-radius: 12px;
  }
  .name {
    margin-top: 20px;
    font-size: 16px;
    color: #555;
  }
</style>
</head>
<body>
  <div class="card">
    <p class="title">AI财富管理与投资应用线下班</p>
    <p class="desc">微信扫码付款</p>
    <img src="wechat-pay.jpg" alt="微信支付" class="qr-img">
    <p class="name">Jason 谢侑辰 (*锦)</p>
  </div>
</body>
</html>
